agent:
  id: "local-dev-agent"
  listen_addr: "127.0.0.1:8731"
  mode: "shadow"

security:
  shadow_secret: ""
  require_signature: false
  allow_remote_bind: false

storage:
  engine: "jsonl"
  path: "./data/agent-events"
  sync_writes: false

logging:
  level: "info"
  path: "./logs/unixsee-agent.log"

limits:
  max_body_bytes: 1048576
  request_timeout_ms: 500

decision:
  enabled: true
  mode: "comparator"
  default_action: "allow"
  compare_unknown: false

diagnostics:
  enabled: true
  recent_mismatch_limit: 100
  expose_recent_mismatches: true
  include_user_agent: false
  include_ip: false

mother:
  enabled: true
  base_url: "http://127.0.0.1:8732"
  agent_id: "local-dev-agent"
  shared_secret: ""
  require_signature: false
  policy_pull_timeout_ms: 500
  policy_refresh_seconds: 30
  use_last_known_good: true
  policy_cache_path: "./data/policy-cache/last-known-policy.json"

telemetry:
  enabled: true
  push_interval_seconds: 30
  push_timeout_ms: 700

policy:
  source: "mother"
