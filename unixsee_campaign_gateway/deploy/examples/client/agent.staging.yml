agent:
  id: "staging-agent-001"
  listen_addr: "127.0.0.1:8731"
  mode: "shadow"

security:
  shadow_secret_file: "/etc/unixsee-gateway/agent-shadow.secret"
  require_signature: false
  allow_remote_bind: false

storage:
  engine: "jsonl"
  path: "/var/lib/unixsee-gateway/agent/events"
  sync_writes: false

logging:
  level: "info"
  path: "/var/log/unixsee-gateway/unixsee-agent.log"

limits:
  max_body_bytes: 1048576
  request_timeout_ms: 500

decision:
  enabled: true
  mode: "comparator"
  default_action: "allow"
  compare_unknown: false

diagnostics:
  enabled: true
  recent_mismatch_limit: 100
  expose_recent_mismatches: true
  include_user_agent: false
  include_ip: false

mother:
  enabled: true
  base_url: "http://127.0.0.1:8732"
  agent_id: "staging-agent-001"
  shared_secret_file: "/etc/unixsee-gateway/mother-agent.secret"
  require_signature: true
  policy_pull_timeout_ms: 700
  policy_refresh_seconds: 30
  use_last_known_good: true
  policy_cache_path: "/var/lib/unixsee-gateway/agent/last-known-policy.json"

telemetry:
  enabled: true
  push_interval_seconds: 30
  push_timeout_ms: 700

policy:
  source: "mother"
  profile_id: "default-local-shadow"
  version: 1
  gateway:
    enabled: true
  campaign:
    enabled: true
    mode: "shadow"
    default_action: "allow"
  storage:
    fail_mode: "open"
  bypass:
    static_assets: true
    wp_internal: true
    admin: true
    checkout: true
    cart: false
    account: false
    api: false
  methods:
    managed: ["GET", "HEAD", "POST"]
  routes:
    static_asset_action: "pass"
    wp_internal_action: "pass"
    admin_action: "pass"
    checkout_action: "pass"
    cart_action: "allow"
    account_action: "allow"
    api_action: "allow"
    product_action: "allow"
    other_action: "allow"
  bot:
    enabled: false
    default_action: "allow"
  queue:
    enabled: false
    default_action: "allow"
