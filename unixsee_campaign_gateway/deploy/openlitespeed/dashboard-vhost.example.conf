# Unixsee Dashboard OpenLiteSpeed reverse proxy example.
# Keep Dashboard bound to 127.0.0.1:8740 and expose only the HTTPS vhost.
# This is an example snippet; adapt paths/listeners in OLS WebAdmin.

# Domain: panel.example.com
# Backend: http://127.0.0.1:8740
# HTTPS listener/certificate is configured in OpenLiteSpeed listener settings.

extprocessor unixsee_dashboard_backend {
  type                    proxy
  address                 http://127.0.0.1:8740
  maxConns                100
  pcKeepAliveTimeout      60
  initTimeout             60
  retryTimeout            0
  respBuffer              0
}

context / {
  type                    proxy
  handler                 unixsee_dashboard_backend
  addDefaultCharset       off
  enableIpGeo             0
  extraHeaders            <<<END_headers
X-Forwarded-Proto: https
X-Forwarded-Host: panel.example.com
X-Real-IP: $REMOTE_ADDR
Cache-Control: no-store
X-Frame-Options: DENY
X-Content-Type-Options: nosniff
Referrer-Policy: no-referrer
Permissions-Policy: camera=(), microphone=(), geolocation=(), payment=()
Content-Security-Policy: default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
END_headers
}

# Notes:
# - Do not cache Dashboard responses.
# - Do not expose 127.0.0.1:8740 directly.
# - WebSocket/upgrade compatibility is handled by proxy context on recent OLS versions.
# - Configure DASHBOARD_TRUST_PROXY=true and DASHBOARD_PUBLIC_BASE_URL=https://panel.example.com.
