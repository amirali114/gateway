agent:
  id: "local-dev-agent"
  listen_addr: "127.0.0.1:8731"
  mode: "shadow"

security:
  shadow_secret: ""
  require_signature: false
  allow_remote_bind: false

storage:
  engine: "jsonl"
  path: "./data/agent-events"
  sync_writes: false

logging:
  level: "info"
  path: "./logs/unixsee-agent.log"

limits:
  max_body_bytes: 1048576
  request_timeout_ms: 500

decision:
  enabled: true
  mode: "comparator"
  default_action: "allow"
  compare_unknown: false

diagnostics:
  enabled: true
  recent_mismatch_limit: 100
  expose_recent_mismatches: true
  include_user_agent: false
  include_ip: false

mother:
  enabled: false
  base_url: "http://127.0.0.1:8732"
  agent_id: "local-dev-agent"
  shared_secret: ""
  require_signature: false # documents expected Mother behavior; Agent signs when shared_secret is non-empty
  policy_pull_timeout_ms: 500
  policy_refresh_seconds: 30
  use_last_known_good: true
  policy_cache_path: "./data/policy-cache/last-known-policy.json"

telemetry:
  enabled: true
  push_interval_seconds: 30
  push_timeout_ms: 700

policy:
  # Use "local" for the embedded R6.1 behavior, or "mother" with mother.enabled=true to pull policy from Mother/Core.
  source: "local"
  profile_id: "default-local-shadow"
  version: 1

  gateway:
    enabled: true

  campaign:
    enabled: true
    mode: "shadow"
    default_action: "allow"

  storage:
    fail_mode: "open"

  # bypass.* controls whether the route class is treated as a bypass.
  # If false, the Agent must not emit *_bypass reasons for that class.
  bypass:
    static_assets: true
    wp_internal: true
    admin: true
    checkout: true
    cart: false
    account: false
    api: false

  methods:
    # Both block-list and inline-list syntax are supported for this known list field.
    # Inline equivalent: managed: ["GET", "HEAD", "POST"]
    managed:
      - "GET"
      - "HEAD"
      - "POST"

  # routes.*_action controls the action returned by route policy.
  # For static/wp_internal/admin/checkout with bypass=false, campaign.default_action is used instead.
  routes:
    static_asset_action: "pass"
    wp_internal_action: "pass"
    admin_action: "pass"
    checkout_action: "pass"
    cart_action: "allow"
    account_action: "allow"
    api_action: "allow"
    product_action: "allow"
    other_action: "allow"

  bot:
    enabled: false
    default_action: "allow"

  queue:
    enabled: false
    default_action: "allow"
