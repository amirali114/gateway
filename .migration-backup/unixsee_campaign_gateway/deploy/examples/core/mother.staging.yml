server:
  listen_addr: "127.0.0.1:8732"
  mode: "dev"

mother:
  listen_addr: "127.0.0.1:8732"
  mode: "dev"

security:
  agent_shared_secret_file: "/etc/unixsee-gateway/mother-agent.secret"
  require_signature: true
  allow_remote_bind: false
  signature_max_skew_seconds: 300

debug:
  enabled: false

management:
  enabled: true
  write_enabled: true
  api_token_file: "/etc/unixsee-gateway/mother-management.token"

storage:
  engine: "json"
  path: "/var/lib/unixsee-gateway/mother"
  sync_writes: true
  backup_on_migration: true

logging:
  level: "info"
  path: "/var/log/unixsee-gateway/unixsee-mother.log"

# Remote Agent mode is explicit only:
# server.listen_addr: "0.0.0.0:8732"
# security.allow_remote_bind: true
# Firewall must allowlist trusted Agent source IPs only.

alerts:
  enabled: true
  evaluation_interval_seconds: 60
  stale_after_seconds: 90
  critical_stale_after_seconds: 300
  max_alerts: 1000

notifications:
  enabled: false
  channels: []
