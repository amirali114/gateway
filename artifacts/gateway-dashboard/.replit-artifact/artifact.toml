kind = "web"
previewPath = "/"
title = "Unixsee Gateway Control"
version = "1.0.0"
id = "artifacts/gateway-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22790

[services.development]
run = "npm run dev"

[services.production]

[services.production.build]
args = ["npm", "run", "build"]

[services.production.run]
args = ["npm", "run", "start"]

[services.production.run.env]
PORT = "22790"
NODE_ENV = "production"

[services.env]
PORT = "22790"
